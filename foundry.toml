[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Arc is a new EVM chain; "paris" avoids PUSH0/transient-storage opcodes that an
# unproven chain may not support yet. Bump to shanghai/cancun once confirmed.
evm_version = "paris"

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
